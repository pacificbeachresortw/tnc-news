<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta property="og:type" content="article" />
<meta property="og:site_name" content="TNC NEWS 台灣網路觀察新聞網" />
<meta name="twitter:card" content="summary_large_image" />
<title>TNC NEWS</title>
<link rel="icon" href="../../image/weblogo.png" type="image/png" />
<link rel="stylesheet" href="../../css/animations.css" />
<link rel="stylesheet" href="../../css/style.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  .article-page{max-width:820px;margin:0 auto;padding:32px 20px 60px}
  .article-cat{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.06);color:#ccc;border:1px solid rgba(255,255,255,.12);padding:4px 14px;border-radius:20px;font-size:.8rem;font-weight:600;letter-spacing:.05em;margin-bottom:18px;text-decoration:none}
  .article-title{font-size:2rem;font-weight:800;line-height:1.3;color:#f0f0f0;margin-bottom:12px;font-family:'Noto Sans TC',sans-serif;word-break:break-word}
  .article-excerpt{font-size:1.05rem;color:#999;line-height:1.7;margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid #222;font-style:italic;word-break:break-word}
  .article-meta{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:28px;font-size:.82rem;color:#666}
  .article-cover{width:100%;border-radius:12px;overflow:hidden;margin-bottom:8px;max-height:480px}
  .article-cover img{width:100%;object-fit:cover;display:block}
  .article-img-credit{font-size:.75rem;color:#555;margin-bottom:24px;display:flex;align-items:center;gap:5px}
  .article-body{font-size:1rem;color:#ddd;line-height:1.9;word-break:break-word}
  .article-body p{margin-bottom:18px}
  .article-extra-img{width:100%;border-radius:10px;overflow:hidden;margin:24px 0 6px}
  .article-extra-img img{width:100%;height:auto;display:block}
  .article-divider{height:1px;background:#222;margin:32px 0}
  .article-back{display:inline-flex;align-items:center;gap:8px;color:#888;font-size:.85rem;text-decoration:none;margin-bottom:24px;transition:color .2s}
  .article-back:hover{color:#f0f0f0}
  .article-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:16px;color:#555}
  .spin{width:32px;height:32px;border:3px solid #333;border-top-color:#888;border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .share-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:0}
  .share-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:6px;border:1px solid #333;background:transparent;color:#999;font-size:.82rem;cursor:pointer;text-decoration:none;transition:all .2s;font-family:inherit}
  .share-btn:hover{background:#1e1e1e;color:#f0f0f0;border-color:#555}
</style>
</head>
<body>
<header class="site-header" style="position:sticky;top:0;z-index:100">
  <div class="header-inner container" style="padding:14px 20px">
    <div class="header-logo">
      <a href="../../index.html" class="logo-img-wrap">
        <img src="../../image/logo.png" alt="TNC NEWS" class="logo-img" />
      </a>
    </div>
    <nav class="main-nav" id="main-nav">
      <ul>
        <li><a href="../../index.html"><i class="fa-solid fa-house nav-icon"></i>首頁</a></li>
        <li><a href="../society.html">社會</a></li>
        <li><a href="../international.html">國際</a></li>
        <li><a href="../tech.html">科技</a></li>
        <li><a href="../entertainment.html">娛樂</a></li>
        <li><a href="../sports.html">體育</a></li>
        <li><a href="../life.html">生活</a></li>
      </ul>
    </nav>
    <div class="header-actions">
      <button class="hamburger" id="hamburger" aria-label="選單"><span></span><span></span><span></span></button>
    </div>
  </div>
</header>

<main style="background:#0d0d0d;min-height:80vh">
  <div class="article-page" id="article-page">
    <div class="article-loading"><div class="spin"></div><span>載入中...</span></div>
  </div>
</main>

<footer class="site-footer">
  <div class="footer-bottom">
    <div class="container footer-bottom-inner">
      <p>&copy; 2026 TNC NEWS 台灣網路觀察新聞網 Taiwan Network Center. All Rights Reserved.</p>
    </div>
  </div>
</footer>

<script src="../../js/main.js"></script>
<script>
(function(){
  'use strict';
  var keys={};
  try{keys=JSON.parse(localStorage.getItem('tnc_admin_keys')||'{}');}catch(e){}
  var KEY=keys.jsonbinKey||'';
  var BID=keys.jsonbinBinId||'';

  function esc(s){return String(s||'').replace(/&/g,'&').replace(/</g,'<').replace(/>/g,'>').replace(/"/g,'"');}
  function fmtDate(v){if(!v)return'';var d=new Date(v);if(isNaN(d.getTime()))return v;return(d.getMonth()+1)+'\u6708'+d.getDate()+'\u65E5 '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
  function catUrl(c){var m={'\u5373\u6642':'society','\u793E\u6703':'society','\u570B\u969B':'international','\u79D1\u6280':'tech','\u5A1B\u6A02':'entertainment','\u9AD4\u80B2':'sports','\u751F\u6D3B':'life'};return'../'+(m[c]||'society')+'.html';}
  function setMeta(k,v){var el=document.querySelector('meta[property="'+k+'"]')||document.querySelector('meta[name="'+k+'"]');if(!el){el=document.createElement('meta');el.setAttribute(k.startsWith('og:')||k.startsWith('twitter:')?'property':'name',k);document.head.appendChild(el);}el.setAttribute('content',v);}

  function getIdFromPath(){
    var p=location.pathname;
    var m=p.match(/\/([^/]+)\.html$/);
    return m?m[1]:null;
  }

  function render(article){
    document.title=article.title+' \u2014 TNC NEWS';
    setMeta('og:title',article.title);
    setMeta('og:description',article.excerpt||article.title);
    if(article.image)setMeta('og:image',article.image);
    setMeta('og:url',location.href);
    setMeta('twitter:title',article.title);
    setMeta('twitter:description',article.excerpt||article.title);
    if(article.image)setMeta('twitter:image',article.image);

    var coverHtml=article.image?'<div class="article-cover"><img src="'+esc(article.image)+'" alt="'+esc(article.title)+'" /></div>':'';
    var creditParts=[];
    if(article.imageSource)creditParts.push('<i class="fa-solid fa-copyright"></i> '+esc(article.imageSource));
    if(article.imagePhotographer)creditParts.push('<i class="fa-solid fa-camera"></i> '+esc(article.imagePhotographer));
    var creditHtml=creditParts.length?'<div class="article-img-credit">'+creditParts.join(' &nbsp;/&nbsp; ')+'</div>':'';

    var bodyHtml=(article.content||'').split('\n').filter(function(l){return l.trim();}).map(function(l){return'<p>'+esc(l)+'</p>';}).join('');

    var extraHtml='';
    if(article.extraImages&&article.extraImages.length){
      extraHtml=article.extraImages.filter(function(i){return i.url;}).map(function(img){
        var cr=[];
        if(img.source)cr.push('<i class="fa-solid fa-copyright"></i> '+esc(img.source));
        if(img.photographer)cr.push('<i class="fa-solid fa-camera"></i> '+esc(img.photographer));
        return'<div class="article-extra-img"><img src="'+esc(img.url)+'" alt="" /></div>'+(cr.length?'<div class="article-img-credit">'+cr.join(' &nbsp;/&nbsp; ')+'</div>':'');
      }).join('');
    }

    var shareUrl=encodeURIComponent(location.href);
    var shareTitle=encodeURIComponent(article.title);

    document.getElementById('article-page').innerHTML=
      '<a href="../../index.html" class="article-back"><i class="fa-solid fa-arrow-left"></i> \u56DE\u9996\u9801</a>'
      +'<a href="'+esc(catUrl(article.category))+'" class="article-cat"><i class="fa-solid fa-tag"></i>'+esc(article.category)+'</a>'
      +'<h1 class="article-title">'+esc(article.title)+'</h1>'
      +(article.excerpt?'<p class="article-excerpt">'+esc(article.excerpt)+'</p>':'')
      +'<div class="article-meta"><span><i class="fa-regular fa-user"></i> '+esc(article.author||'TNC\u7DE8\u8F2F')+'</span><span><i class="fa-regular fa-clock"></i> '+fmtDate(article.date)+'</span></div>'
      +coverHtml+creditHtml
      +'<div class="article-body">'+bodyHtml+'</div>'
      +extraHtml
      +'<div class="article-divider"></div>'
      +'<div class="share-bar"><span style="font-size:.82rem;color:#666"><i class="fa-solid fa-share-nodes"></i> \u5206\u4EAB\uFF1A</span>'
      +'<a class="share-btn" href="https://www.facebook.com/sharer/sharer.php?u='+shareUrl+'" target="_blank" rel="noopener"><i class="fa-brands fa-facebook-f"></i> Facebook</a>'
      +'<a class="share-btn" href="https://twitter.com/intent/tweet?url='+shareUrl+'&text='+shareTitle+'" target="_blank" rel="noopener"><i class="fa-brands fa-x-twitter"></i> X</a>'
      +'<a class="share-btn" href="https://line.me/R/msg/text/?'+shareTitle+'%0D%0A'+shareUrl+'" target="_blank" rel="noopener"><i class="fa-brands fa-line"></i> LINE</a>'
      +'<button class="share-btn" onclick="navigator.clipboard.writeText(location.href).then(function(){this.textContent=\'\u5DF2\u8907\u88FD\u9023\u7D50\';}.bind(this))"><i class="fa-regular fa-copy"></i> \u8907\u88FD\u9023\u7D50</button>'
      +'</div>';
  }

  function showError(msg){
    document.getElementById('article-page').innerHTML='<div style="text-align:center;padding:60px 20px;color:#666"><h2 style="color:#888"><i class="fa-solid fa-triangle-exclamation"></i> '+msg+'</h2><p><a href="../../index.html" style="color:#888">\u8FD4\u56DE\u9996\u9801</a></p></div>';
  }

  var id=getIdFromPath();
  if(!id||id==='template'){showError('\u6B64\u9801\u9762\u70BA\u6A23\u677F\uFF0C\u8ACB\u900F\u904E\u6B63\u78BA\u9023\u7D50\u958B\u555F\u6587\u7AE0');return;}
  if(!KEY||!BID){showError('\u5C1A\u672A\u8A2D\u5B9A API \u91D1\u9470\uFF0C\u8ACB\u5148\u81F3\u5F8C\u53F0\u8A2D\u5B9A');return;}

  fetch('https://api.jsonbin.io/v3/b/'+BID+'/latest',{headers:{'X-Master-Key':KEY}})
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
    .then(function(data){
      var news=(data.record&&data.record.news)||[];
      var article=null;
      for(var i=0;i<news.length;i++){if(String(news[i].id)===String(id)){article=news[i];break;}}
      if(!article){showError('\u627E\u4E0D\u5230\u6307\u5B9A\u6587\u7AE0');return;}
      if(article.published===false){showError('\u6B64\u6587\u7AE0\u5C1A\u672A\u767C\u5E03');return;}
      render(article);
    })
    .catch(function(err){showError('\u8F09\u5165\u5931\u6557\uFF1A'+err.message);});
})();
</script>
</body>
</html>
